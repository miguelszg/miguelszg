<use href="#petal" x="200"><animateTransform attributeName="transform" type="translate" values="0,-30;0,240" dur="9s" begin="1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="5s" additive="sum" repeatCount="indefinite"/></use>
