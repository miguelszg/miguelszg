<use href="#petal" x="430"><animateTransform attributeName="transform" type="translate" values="0,-25;0,240" dur="8s" begin="0.6s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="4.5s" additive="sum" repeatCount="indefinite"/></use>
<use href="#petal" x="560"><animateTransform attributeName="transform" type="translate" values="0,-15;0,240" dur="7.5s" begin="1.8s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" additive="sum" repeatCount="indefinite"/></use>
<use href="#petal" x="630"><animateTransform attributeName="transform" type="translate" values="0,-35;0,240" dur="9.5s" begin="3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="5.5s" additive="sum" repeatCount="indefinite"/></use>
<use href="#petal" x="140"><animateTransform attributeName="transform" type="translate" values="0,-5;0,240" dur="6s" begin="2.6s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;360" dur="3.8s" additive="sum" repeatCount="indefinite"/></use>
<use href="#petal" x="500"><animateTransform attributeName="transform" type="translate" values="0,-18;0,240" dur="8.5s" begin="0.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="4.2s" additive="sum" repeatCount="indefinite"/></use>
