<svg width="100%" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
<title>Banner de perfil estilo japonés con sakura animada</title>
<desc>Fondo ilustrado con luna, montañas, olas y pétalos de sakura cayendo en animación, en rosa, blanco y negro, con el nombre Miguel García y el subtítulo Full Stack Developer e IT Support</desc>
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1a1014"/>
<stop offset="55%" stop-color="#3d1f2b"/>
<stop offset="100%" stop-color="#f7d8e0"/>
</linearGradient>
<linearGradient id="waveFar" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#5c2436"/>
<stop offset="100%" stop-color="#3d1726"/>
</linearGradient>
<linearGradient id="waveNear" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0f0a0c"/>
<stop offset="100%" stop-color="#1c0f14"/>
</linearGradient>
<path id="petal" d="M0 0 C 3 -5, 9 -5, 9 0 C 9 5, 3 7, 0 0 Z" fill="#f9c7d4"/>
</defs>
<rect x="0" y="0" width="680" height="220" fill="url(#sky)"/>
<circle cx="540" cy="62" r="40" fill="#fbe9ec"/>
<circle cx="540" cy="62" r="40" fill="none" stroke="#f6c9d3" stroke-width="1"/>
<path d="M0 150 L60 110 L120 150 L180 100 L240 150 L300 120 L360 150 L420 95 L480 150 L540 115 L600 150 L660 105 L680 150 L680 220 L0 220 Z" fill="url(#waveFar)" opacity="0.9"/>
<path d="M0 175 C 40 150, 80 150, 120 175 C 160 150, 200 150, 240 175 C 280 150, 320 150, 360 175 C 400 150, 440 150, 480 175 C 520 150, 560 150, 600 175 C 630 158, 660 158, 680 175 L 680 220 L 0 220 Z" fill="url(#waveNear)"/>
<path d="M30 178 q10 -14 20 0 q10 -14 20 0" fill="none" stroke="#f7d8e0" stroke-width="1.5" opacity="0.6"/>
<path d="M170 178 q10 -14 20 0 q10 -14 20 0" fill="none" stroke="#f7d8e0" stroke-width="1.5" opacity="0.6"/>
<path d="M310 178 q10 -14 20 0 q10 -14 20 0" fill="none" stroke="#f7d8e0" stroke-width="1.5" opacity="0.6"/>
<path d="M450 178 q10 -14 20 0 q10 -14 20 0" fill="none" stroke="#f7d8e0" stroke-width="1.5" opacity="0.6"/>
<path d="M590 178 q10 -14 20 0 q10 -14 20 0" fill="none" stroke="#f7d8e0" stroke-width="1.5" opacity="0.6"/>
<g opacity="0.85">
<path d="M50 60 q-3 -8 4 -10 q3 -7 9 -3 q7 -4 10 4 q8 1 6 9 q5 6 -2 10 q-2 7 -9 5 q-5 6 -11 1 q-8 3 -10 -5 q-7 -2 -5 -9 Z" fill="#f4a9bf"/>
</g>
<g opacity="0.7">
<path d="M610 95 q-2 -6 3 -7 q2 -5 7 -2 q5 -3 7 3 q6 1 4 6 q4 4 -1 7 q-1 5 -7 4 q-4 4 -8 1 q-6 2 -7 -4 q-5 -1 -3 -6 Z" fill="#f4a9bf"/>
</g>
<rect x="0" y="0" width="680" height="220" fill="#1a0e13" opacity="0.18"/>
<text x="340" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#fdf2f5" font-weight="700" letter-spacing="2">Miguel García</text>
<text x="340" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#f6c9d3" letter-spacing="3">FULL STACK DEVELOPER · IT SUPPORT</text>
<g>
